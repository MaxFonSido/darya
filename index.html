<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAD → ALA — trip checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#FBF6EC;
    --surface:#FFFFFF;
    --surface-raised:#FFF8EC;
    --border:#ECE1CC;
    --border-soft:#F3EAD8;
    --text:#3E3527;
    --text-dim:#8C816D;
    --text-faint:#B7AD98;
    --gold:#D9603D;
    --gold-dim:#F2B79C;
    --teal:#3E8B4A;
    --teal-dim:#CDE8C9;
    --rust:#E2543A;
    --rust-dim:#F3B7A8;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:760px;
    margin:0 auto;
    padding:2.5rem 1.5rem 6rem;
  }

  /* ---- cover photo banner ---- */
  .banner-card{
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface);
    overflow:hidden;
    margin-bottom:2rem;
  }
  .banner-photo{
    position:relative;
    width:100%;
    height:170px;
    background:var(--surface-raised);
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .banner-photo-empty{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:12px;
  }
  .banner-photo-empty svg{width:26px; height:26px; opacity:0.7;}
  .banner-edit-btn{
    position:absolute;
    bottom:10px;
    right:10px;
    background:rgba(255,255,255,0.92);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--font-mono);
    font-size:11px;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
  }
  .banner-text{
    padding:1.5rem 1.25rem 1.75rem;
  }
  h1{
    font-family:var(--font-display);
    font-weight:500;
    font-size:26px;
    margin:0 0 0.4rem;
    letter-spacing:-0.01em;
  }
  .route-sub{
    font-size:14px;
    color:var(--text-dim);
    margin:0;
    line-height:1.6;
  }

  /* ---- tabs ---- */
  .tabs{
    display:flex;
    gap:6px;
    margin-bottom:1.2rem;
  }
  .tab-btn{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.03em;
    padding:10px 12px;
    border-radius:4px;
    cursor:pointer;
    text-align:center;
  }
  .tab-btn.active{
    border-color:var(--gold-dim);
    color:var(--gold);
    background:var(--surface-raised);
  }

  /* ---- overall progress ---- */
  .progress-bar-outer{
    position:sticky;
    top:0;
    z-index:5;
    background:var(--ink);
    padding:12px 0 16px;
    margin-bottom:0.5rem;
  }
  .progress-row{
    display:flex;
    align-items:center;
    gap:12px;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--surface-raised);
    border:1px solid var(--border);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--gold);
    width:0%;
    transition:width 0.4s ease;
  }

  /* ---- category cards ---- */
  .category{
    border:1px solid var(--border);
    border-radius:4px;
    background:var(--surface);
    margin-bottom:1.1rem;
    overflow:hidden;
  }
  .category.urgent{border-color:var(--rust-dim);}
  .cat-head{
    display:flex;
    align-items:center;
    gap:14px;
    padding:1.1rem 1.25rem;
    border-bottom:1px solid var(--border-soft);
  }
  .stamp{
    flex-shrink:0;
    width:46px;height:46px;
    border-radius:50%;
    border:2px solid var(--gold-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:500;
    letter-spacing:0.03em;
    color:var(--gold);
  }
  .category.urgent .stamp{border-color:var(--rust); color:var(--rust);}
  .cat-titles{flex:1; min-width:0;}
  .cat-title{
    font-family:var(--font-display);
    font-size:18px;
    font-weight:500;
    margin:0 0 2px;
  }
  .cat-note{
    font-size:12.5px;
    color:var(--text-faint);
    margin:0;
  }
  .category.urgent .cat-note{color:var(--rust);}
  .cat-ring{
    flex-shrink:0;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
    text-align:right;
    min-width:38px;
  }

  .items{padding:0.4rem 0.6rem 0.7rem;}
  .item{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:0.6rem 0.65rem;
    border-radius:3px;
    cursor:pointer;
    user-select:none;
  }
  .item:hover{background:var(--surface-raised);}
  .box{
    flex-shrink:0;
    width:18px;height:18px;
    margin-top:2px;
    border:1.5px solid var(--text-faint);
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:border-color 0.15s;
  }
  .item.done .box{border-color:var(--teal); background:var(--teal-dim);}
  .box svg{width:11px;height:11px; opacity:0; transition:opacity 0.15s;}
  .item.done .box svg{opacity:1;}
  .item-text{
    font-size:14.5px;
    line-height:1.5;
    color:var(--text);
  }
  .item.done .item-text{color:var(--text-faint); text-decoration:line-through; text-decoration-color:var(--text-faint);}

  /* clothing season groups */
  .season-group{padding:0 0.6rem 0.4rem;}
  .season-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--gold);
    padding:0.7rem 0.65rem 0.2rem;
  }

  footer{
    margin-top:2.2rem;
    padding-top:1.3rem;
    border-top:1px dashed var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
  }
  .reset-btn{
    background:none;
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:var(--font-mono);
    font-size:11px;
    padding:6px 12px;
    border-radius:3px;
    cursor:pointer;
  }
  .reset-btn:hover{border-color:var(--rust); color:var(--rust);}

  @media (max-width:480px){
    .stop-code{font-size:10px;}
    .cat-title{font-size:16.5px;}
  }

  /* ---- identity picker ---- */
  .picker-overlay{
    min-height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
  }
  .picker-card{
    max-width:360px;
    width:100%;
    text-align:center;
  }
  .picker-eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 0.6rem;
  }
  .picker-title{
    font-family:var(--font-display);
    font-size:22px;
    font-weight:500;
    margin:0 0 1.6rem;
  }
  .picker-btn{
    display:block;
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--font-body);
    font-size:15px;
    font-weight:500;
    padding:14px;
    border-radius:4px;
    cursor:pointer;
    margin-bottom:10px;
  }
  .picker-btn:hover{border-color:var(--gold-dim); background:var(--surface-raised);}

  /* ---- person switcher ---- */
  .person-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1rem;
  }
  .person-switch{
    display:flex;
    gap:6px;
  }
  .person-btn{
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:var(--font-mono);
    font-size:12px;
    padding:8px 14px;
    border-radius:4px;
    cursor:pointer;
  }
  .person-btn.active{
    border-color:var(--teal-dim);
    color:var(--teal);
    background:var(--surface-raised);
  }
  .switch-profile-link{
    background:none;
    border:none;
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:11px;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }
  .readonly-banner{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--gold);
    border:1px solid var(--gold-dim);
    border-radius:4px;
    padding:8px 12px;
    margin-bottom:1rem;
  }
  .item.readonly{cursor:default;}
  .item.readonly:hover{background:none;}

  /* ---- content editing ---- */
  .edit-row{
    display:flex;
    justify-content:flex-end;
    margin-bottom:0.6rem;
  }
  .edit-toggle-btn{
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:var(--font-mono);
    font-size:11px;
    padding:6px 12px;
    border-radius:3px;
    cursor:pointer;
  }
  .edit-toggle-btn.active{
    border-color:var(--gold-dim);
    color:var(--gold);
    background:var(--surface-raised);
  }
  .item-delete{
    margin-left:auto;
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:0 4px;
  }
  .item-delete:hover{color:var(--rust);}
  .item-edit-input{
    flex:1;
    font-size:14.5px;
    font-family:var(--font-body);
    color:var(--text);
    border:1px solid var(--gold-dim);
    border-radius:3px;
    padding:4px 6px;
    background:var(--surface);
  }
  .add-item-row{
    display:flex;
    gap:8px;
    padding:0.3rem 0.65rem 0.7rem;
  }
  .add-item-input{
    flex:1;
    background:var(--surface-raised);
    border:1px solid var(--border);
    border-radius:3px;
    padding:8px 10px;
    font-family:var(--font-body);
    font-size:13.5px;
    color:var(--text);
  }
  .add-item-btn{
    background:var(--surface);
    border:1px solid var(--gold-dim);
    color:var(--gold);
    font-family:var(--font-mono);
    font-size:12px;
    padding:0 14px;
    border-radius:3px;
    cursor:pointer;
  }
  .add-item-btn:hover{background:var(--surface-raised);}
</style>
</head>
<body>
<div class="wrap">

  <div id="pickerScreen"></div>
  <div id="appScreen" style="display:none;">

  <div class="person-row">
    <div class="person-switch" id="personSwitch"></div>
    <button class="switch-profile-link" id="switchProfileBtn">Not you? Switch profile</button>
  </div>

  <div id="readonlyBanner"></div>

  <div class="banner-card">
    <div class="banner-photo" id="bannerPhoto">
      <div class="banner-photo-empty" id="bannerEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.2"/><path d="M8 6l1.2-2h5.6L16 6"/></svg>
        <span>Add a cover photo</span>
      </div>
      <button class="banner-edit-btn" id="bannerEditBtn" type="button">Change photo</button>
      <input type="file" id="bannerInput" accept="image/*" style="display:none;">
    </div>
    <div class="banner-text">
      <h1>Almaty trip checklist</h1>
      <p class="route-sub">Baby due ~Aug 15. Based in Almaty through October, with a few days in Taraz. Tap any item to check it off — your list saves for you, and you can peek at each other's progress.</p>
    </div>
  </div>

  <div class="edit-row">
    <button class="edit-toggle-btn" id="editToggleBtn" type="button">Edit content</button>
  </div>

  <div class="tabs" id="tabNav"></div>

  <div class="progress-bar-outer">
    <div class="progress-row">
      <span id="progressLabel">0 / 0 packed</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span id="progressPct">0%</span>
    </div>
  </div>

  <div id="categories"></div>

  <footer>
    <span id="footerSaveLabel">Saved automatically</span>
    <button class="reset-btn" id="resetBtn">Reset all</button>
  </footer>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-H0JUF-O0ufKc9GRQS0OybhPrdqeH0kY",
  authDomain: "almaty-checklist.firebaseapp.com",
  projectId: "almaty-checklist",
  storageBucket: "almaty-checklist.firebasestorage.app",
  messagingSenderId: "307639070106",
  appId: "1:307639070106:web:c71151af3cdb70621a1e23"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PEOPLE = [
  {id:'kiarash', label:'Kiarash'},
  {id:'zarina', label:'Zarina'}
];

function docRefFor(personId){
  return doc(db, "checklist", personId);
}
const bannerDocRef = doc(db, "checklist", "banner");
const contentDocRef = doc(db, "checklist", "content");

let identity = localStorage.getItem('checklist-identity');
let viewing = identity;
let unsubscribe = null;
let editMode = false;
const DEFAULT_TABS = [
  {
    id:'packing', label:'Packing checklist',
    categories:[
      {
        code:'DOC', title:'Documents & legal', urgent:true,
        note:'Handle before flying — some steps take weeks',
        items:[

        ]
      },
      {
        code:'FED', title:'Baby feeding',
        items:[

          'Bottles + extra nipples',

        ]
      },
      {
        code:'GER', title:'Baby gear',
        items:[

          'Several newborn / 0–3mo outfits (light layers)',

        ]
      },
      {
        code:'SZN', title:'Clothing by season',
        seasons:[
          {label:'August', items:['Light layers, breathable fabrics','One light rain jacket']},
          {label:'September', items:['Sweaters, a warm layer','Closed-toe shoes']},
          {label:'October', items:['Real winter coat','Gloves','Waterproof boots']}
        ]
      },
      {
        code:'TRZ', title:'For the Taraz visit',
        items:[

        ]
      },
      {
        code:'EXT', title:'Practical extras',
        items:[
          'Universal power adapter (Type C/F, 220V)',

        ]
      }
    ]
  },
  {
    id:'travelday', label:'Travel day',
    categories:[
      {
        code:'TRV', title:'Take with you on travel day',
        items:[
          'Toothbrush, toothpaste, shaver, perfume',
          'External battery charger',
          'Sport / dress / dance shoes',
          'Eyeglasses and sunglasses',
          'Underwear, socks, belt',
          'Casual / dress shirt',
          'Casual / dress pants, pajamas',
          'Mobile chargers (Android/iPhone — car chargers)',
          'Mobile hanger from the car',
          'Watch charger',
          'Health and gym stuff, vitamins',
          'Warm clothing',
          'Laptop and charger',
          'Shampoo, towel',
          'Headphones',
          'Passport, passport card',
          'Swimwear',

          'Sandals',
          'Cash',
          'Sleep pill',
          'USB hub',
          'Rain jacket',
          'Replace watch band',
          'Souvenir',
          'Hat',
          'DJI camera',
          'Capital One credit card',
          'Kindle',
          'EZPass',

          'Shoulder massager',

          'Speaker',

        ]
      }
    ]
  }
];

let content = null;

function idBase(prefix, text){
  return prefix + ':' + text.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40);
}

function buildDefaultContent(){
  const used = new Set();
  const uniqueId = (prefix, text) => {
    let id = idBase(prefix, text), n = 2;
    while(used.has(id)){ id = idBase(prefix, text) + '-' + n; n++; }
    used.add(id);
    return id;
  };
  return {
    tabs: DEFAULT_TABS.map(tab => ({
      id: tab.id,
      label: tab.label,
      categories: tab.categories.map(cat => ({
        code: cat.code,
        title: cat.title,
        urgent: !!cat.urgent,
        note: cat.note || null,
        items: cat.items ? cat.items.map(text => ({ id: uniqueId(tab.id+':'+cat.code, text), text })) : undefined,
        seasons: cat.seasons ? cat.seasons.map(s => ({
          label: s.label,
          items: s.items.map(text => ({ id: uniqueId(tab.id+':'+cat.code+':'+s.label, text), text }))
        })) : undefined
      }))
    }))
  };
}

function genId(){
  return 'item-' + Math.random().toString(36).slice(2,9);
}

async function persistContent(){
  try{
    await setDoc(contentDocRef, { json: JSON.stringify(content) });
  }catch(e){
    console.error('Content sync error', e);
  }
}

function subscribeToContent(){
  onSnapshot(contentDocRef, (snap) => {
    if(snap.exists()){
      try{ content = JSON.parse(snap.data().json); }catch(e){ content = buildDefaultContent(); }
    } else {
      content = buildDefaultContent();
      persistContent();
    }
    render();
  }, (err) => {
    console.error('Content sync listener error', err);
  });
}

const STORAGE_KEY = 'checklist-state';
let state = {};
let activeTab = DEFAULT_TABS[0].id;

function checkIcon(){
  return '<svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.7 9L10 2.5" stroke="#3E8B4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function render(){
  const personSwitch = document.getElementById('personSwitch');
  personSwitch.innerHTML = '';
  PEOPLE.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'person-btn' + (p.id === viewing ? ' active' : '');
    btn.textContent = p.id === identity ? 'My list' : p.label + '\u2019s list';
    btn.addEventListener('click', () => { switchViewing(p.id); });
    personSwitch.appendChild(btn);
  });

  const banner = document.getElementById('readonlyBanner');
  const footerLabel = document.getElementById('footerSaveLabel');
  const resetBtn = document.getElementById('resetBtn');
  const editToggleBtn = document.getElementById('editToggleBtn');
  if(viewing !== identity){
    const partner = PEOPLE.find(p => p.id === viewing);
    banner.innerHTML = '<div class="readonly-banner">Viewing ' + partner.label + '\u2019s list — read-only</div>';
    footerLabel.textContent = 'Viewing ' + partner.label + '\u2019s progress';
    resetBtn.style.display = 'none';
    editToggleBtn.style.display = 'none';
    editMode = false;
  } else {
    banner.innerHTML = '';
    footerLabel.textContent = 'Saved automatically for you';
    resetBtn.style.display = '';
    editToggleBtn.style.display = '';
    editToggleBtn.textContent = editMode ? 'Done editing' : 'Edit content';
    editToggleBtn.classList.toggle('active', editMode);
  }

  const tabNav = document.getElementById('tabNav');
  tabNav.innerHTML = '';
  DEFAULT_TABS.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.id === activeTab ? ' active' : '');
    btn.textContent = tab.label;
    btn.addEventListener('click', () => { activeTab = tab.id; render(); });
    tabNav.appendChild(btn);
  });

  const container = document.getElementById('categories');
  container.innerHTML = '';

  if(!content){
    container.innerHTML = '<p style="font-family:var(--font-mono);font-size:12px;color:var(--text-faint);padding:1rem;">Loading checklist…</p>';
    updateProgress();
    return;
  }

  const currentTab = content.tabs.find(t => t.id === activeTab);
  if(!currentTab){ updateProgress(); return; }
  const canEdit = editMode && (viewing === identity);

  currentTab.categories.forEach(cat => {
    const catEl = document.createElement('div');
    catEl.className = 'category' + (cat.urgent ? ' urgent' : '');

    let allIds = [];
    if(cat.items){ allIds = cat.items.map(it => it.id); }
    if(cat.seasons){ cat.seasons.forEach(s => s.items.forEach(it => allIds.push(it.id))); }
    const doneCount = allIds.filter(id => state[id]).length;

    const head = document.createElement('div');
    head.className = 'cat-head';
    head.innerHTML =
      '<div class="stamp">' + cat.code + '</div>' +
      '<div class="cat-titles"><p class="cat-title">' + cat.title + '</p>' +
      (cat.note ? '<p class="cat-note">' + cat.note + '</p>' : '') + '</div>' +
      '<div class="cat-ring">' + doneCount + '/' + allIds.length + '</div>';
    catEl.appendChild(head);

    if(cat.items){
      const itemsWrap = document.createElement('div');
      itemsWrap.className = 'items';
      cat.items.forEach(itemObj => {
        itemsWrap.appendChild(makeItemRow(itemObj, cat.items));
      });
      catEl.appendChild(itemsWrap);
      if(canEdit){ catEl.appendChild(makeAddRow(cat.items)); }
    }

    if(cat.seasons){
      cat.seasons.forEach(s => {
        const grp = document.createElement('div');
        grp.className = 'season-group';
        const label = document.createElement('div');
        label.className = 'season-label';
        label.textContent = s.label;
        grp.appendChild(label);
        const itemsWrap = document.createElement('div');
        itemsWrap.className = 'items';
        itemsWrap.style.padding = '0';
        s.items.forEach(itemObj => {
          itemsWrap.appendChild(makeItemRow(itemObj, s.items));
        });
        grp.appendChild(itemsWrap);
        if(canEdit){ grp.appendChild(makeAddRow(s.items)); }
        catEl.appendChild(grp);
      });
    }

    container.appendChild(catEl);
  });

  updateProgress();
}

function makeItemRow(itemObj, parentArray){
  const editable = (viewing === identity);
  const canEdit = editable && editMode;
  const id = itemObj.id;
  const row = document.createElement('div');
  row.className = 'item' + (state[id] ? ' done' : '') + (editable ? '' : ' readonly');
  row.dataset.id = id;

  const box = document.createElement('div');
  box.className = 'box';
  box.innerHTML = checkIcon();
  if(editable){
    box.addEventListener('click', (e) => { e.stopPropagation(); toggleItem(id); });
  }

  const textEl = document.createElement('div');
  textEl.className = 'item-text';
  textEl.textContent = itemObj.text;

  row.appendChild(box);
  row.appendChild(textEl);

  if(canEdit){
    textEl.addEventListener('click', (e) => {
      e.stopPropagation();
      startInlineEdit(textEl, itemObj);
    });
    const delBtn = document.createElement('button');
    delBtn.className = 'item-delete';
    delBtn.type = 'button';
    delBtn.textContent = '\u00d7';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parentArray.indexOf(itemObj);
      if(idx > -1){ parentArray.splice(idx, 1); }
      persistContent();
      render();
    });
    row.appendChild(delBtn);
  } else if(editable){
    row.addEventListener('click', () => toggleItem(id));
  }

  return row;
}

function startInlineEdit(textEl, itemObj){
  const input = document.createElement('input');
  input.className = 'item-edit-input';
  input.value = itemObj.text;
  textEl.replaceWith(input);
  input.focus();
  input.select();
  let done = false;
  const commit = () => {
    if(done) return;
    done = true;
    const val = input.value.trim();
    if(val){ itemObj.text = val; }
    persistContent();
    render();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ input.blur(); }
    if(e.key === 'Escape'){ done = true; render(); }
  });
}

function makeAddRow(parentArray){
  const row = document.createElement('div');
  row.className = 'add-item-row';
  const input = document.createElement('input');
  input.className = 'add-item-input';
  input.placeholder = 'Add item\u2026';
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'add-item-btn';
  btn.textContent = 'Add';
  const submit = () => {
    const val = input.value.trim();
    if(!val) return;
    parentArray.push({ id: genId(), text: val });
    persistContent();
    render();
  };
  btn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => { if(e.key === 'Enter'){ submit(); } });
  row.appendChild(input);
  row.appendChild(btn);
  return row;
}

function totalCounts(){
  let total = 0, done = 0;
  if(!content) return {total, done};
  const currentTab = content.tabs.find(t => t.id === activeTab);
  if(!currentTab) return {total, done};
  currentTab.categories.forEach(cat => {
    if(cat.items){
      cat.items.forEach(it => { total++; if(state[it.id]) done++; });
    }
    if(cat.seasons){
      cat.seasons.forEach(s => s.items.forEach(it => {
        total++; if(state[it.id]) done++;
      }));
    }
  });
  return {total, done};
}

function updateProgress(){
  const {total, done} = totalCounts();
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total + ' packed';
}

async function toggleItem(id){
  if(viewing !== identity) return;
  state[id] = !state[id];
  render();
  try{
    await setDoc(docRefFor(identity), { json: JSON.stringify(state) });
  }catch(e){
    console.error('Sync error', e);
  }
}

function switchViewing(personId){
  if(personId === viewing) return;
  viewing = personId;
  subscribeToViewing();
}

function subscribeToViewing(){
  if(unsubscribe){ unsubscribe(); unsubscribe = null; }
  render();
  unsubscribe = onSnapshot(docRefFor(viewing), (snap) => {
    if(snap.exists()){
      try{ state = JSON.parse(snap.data().json || '{}'); }catch(e){ state = {}; }
    } else {
      state = {};
    }
    render();
  }, (err) => {
    console.error('Sync listener error', err);
  });
}

document.getElementById('resetBtn').addEventListener('click', async () => {
  if(viewing !== identity) return;
  if(!confirm('Clear all checked items on your list?')) return;
  state = {};
  render();
  try{
    await setDoc(docRefFor(identity), { json: JSON.stringify(state) });
  }catch(e){
    console.error('Sync error', e);
  }
});

function showPicker(){
  document.getElementById('appScreen').style.display = 'none';
  const pickerScreen = document.getElementById('pickerScreen');
  pickerScreen.style.display = '';
  pickerScreen.innerHTML =
    '<div class="picker-overlay"><div class="picker-card">' +
    '<p class="picker-eyebrow">Almaty trip checklist</p>' +
    '<h1 class="picker-title">Who\u2019s checking the list?</h1>' +
    PEOPLE.map(p => '<button class="picker-btn" data-person="' + p.id + '">' + p.label + '</button>').join('') +
    '</div></div>';
  pickerScreen.querySelectorAll('.picker-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      identity = btn.dataset.person;
      localStorage.setItem('checklist-identity', identity);
      viewing = identity;
      enterApp();
    });
  });
}

function enterApp(){
  document.getElementById('pickerScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = '';
  subscribeToViewing();
}

document.getElementById('switchProfileBtn').addEventListener('click', () => {
  if(unsubscribe){ unsubscribe(); unsubscribe = null; }
  localStorage.removeItem('checklist-identity');
  identity = null;
  viewing = null;
  showPicker();
});

function setBannerImage(dataUrl){
  const photoEl = document.getElementById('bannerPhoto');
  const emptyEl = document.getElementById('bannerEmpty');
  if(dataUrl){
    photoEl.style.backgroundImage = 'url(' + dataUrl + ')';
    emptyEl.style.display = 'none';
  } else {
    photoEl.style.backgroundImage = '';
    emptyEl.style.display = '';
  }
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      const maxW = 960;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      let quality = 0.75;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while(dataUrl.length > 700000 && quality > 0.35){
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      resolve(dataUrl);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function initBanner(){
  onSnapshot(bannerDocRef, (snap) => {
    setBannerImage(snap.exists() ? snap.data().image : null);
  }, (err) => {
    console.error('Banner sync error', err);
  });

  const openPicker = () => document.getElementById('bannerInput').click();
  document.getElementById('bannerPhoto').addEventListener('click', openPicker);
  document.getElementById('bannerEditBtn').addEventListener('click', (e) => { e.stopPropagation(); openPicker(); });

  document.getElementById('bannerInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try{
      const dataUrl = await compressImage(file);
      setBannerImage(dataUrl);
      await setDoc(bannerDocRef, { image: dataUrl });
    }catch(err){
      console.error('Banner upload error', err);
      alert('Could not use that photo — try a different image.');
    }
  });
}

document.getElementById('editToggleBtn').addEventListener('click', () => {
  editMode = !editMode;
  render();
});

initBanner();
subscribeToContent();

if(identity && PEOPLE.some(p => p.id === identity)){
  enterApp();
} else {
  showPicker();
}
</script>
